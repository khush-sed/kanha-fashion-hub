<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Kanha Fashion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .header-bg {
        background-color: #eaf4f4; /* Soft pastel green */
      }
      .primary-text {
        color: #2c3e50; /* Dark gray-blue for text */
      }
      .button-primary {
        background-color: #2c3e50; /* Dark gray-blue for buttons */
        color: #ffffff;
      }
      .button-primary:hover {
        background-color: #34495e; /* Slightly darker shade on hover */
      }
    </style>
  </head>
  <body class="bg-white min-h-screen flex flex-col">
    <!-- Navigation Bar -->
    <nav class="header-bg py-4 shadow-md">
      <div class="container mx-auto flex justify-between items-center px-4">
        <!-- Logo -->
        <a
          href="./index.html"
          class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gray-800 via-blue-600 to-gray-800 drop-shadow-lg"
        >
          Kanha Fashion Hub
        </a>

        <!-- Navigation Links -->
        <div class="flex space-x-6">
          <!-- <a
            href="./index.html"
            class="hover:text-gray-600 transition duration-300 flex items-center"
          >
            <span class="icon">🏠</span>
            <span class="ml-2 text-sm font-semibold primary-text"></span>
          </a> -->
          <a
            href="./signup.html"
            class="text-sm font-semibold primary-text hover:text-gray-600 transition duration-300"
          >
            Sign Up
          </a>
        </div>
      </div>
    </nav>

    <!-- Login Form Section -->
    <section
      class="flex-grow flex items-center justify-center px-4 py-8 bg-white"
    >
      <div
        class="bg-white text-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md border border-gray-200"
      >
        <h1 class="text-2xl font-bold text-center mb-6 primary-text">
          Welcome Back!
        </h1>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6" onsubmit="handleLogin(event)">
          <!-- Email/Username Field -->
          <div>
            <label
              for="email"
              class="block text-sm font-semibold mb-2 primary-text"
              >Email or Username</label
            >
            <input
              type="text"
              id="email"
              name="email"
              placeholder="Enter your email or username"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <!-- Password Field -->
          <div>
            <label
              for="password"
              class="block text-sm font-semibold mb-2 primary-text"
              >Password</label
            >
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500"
              required
            />
          </div>

          <!-- Login Button -->
          <button
            type="submit"
            class="w-full button-primary py-3 rounded-lg font-semibold transition duration-300"
          >
            Login
          </button>
        </form>

        <!-- Back to Home Link -->
        <p class="text-center text-sm mt-6">
          <a
            href="./index.html"
            class="text-blue-600 font-semibold hover:underline"
          >
            Back to Home
          </a>
        </p>
      </div>
    </section>

    <!-- Footer Section -->
    <footer class="header-bg py-6">
      <div class="container mx-auto text-center">
        <p class="text-sm primary-text">
          © 2025 Kanha Fashion Hub. All rights reserved.
        </p>
      </div>
    </footer>

    <script>
      function handleLogin(event) {
        event.preventDefault(); // Prevent form submission

        // Get form data
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        // Simulate login success
        alert("Login successful! Redirecting to the home page...");

        // Store login status in localStorage
        localStorage.setItem("isLoggedIn", "true");

        // Redirect to the home page
        window.location.href = "./index.html";
      }
    </script>
  </body>
</html>
