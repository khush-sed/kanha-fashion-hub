<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment - Kanha Fashion Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .header-bg {
        background-color: #eaf4f4; /* Soft pastel green */
      }
      .primary-text {
        color: #2c3e50; /* Dark gray-blue for text */
      }
      .button-primary {
        background-color: #2c3e50; /* Dark gray-blue for buttons */
        color: #ffffff;
      }
      .button-primary:hover {
        background-color: #34495e; /* Slightly darker shade on hover */
      }
    </style>
  </head>
  <body class="bg-white text-gray-800 min-h-screen">
    <!-- Navigation Bar -->
    <nav class="header-bg py-4 shadow-md">
      <div class="container mx-auto flex justify-between items-center px-4">
        <!-- Logo -->
        <a
          href="./index.html"
          class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-gray-800 via-blue-600 to-gray-800 drop-shadow-lg"
        >
          Kanha Fashion Hub
        </a>

        <!-- Navigation Links -->
        <div class="flex space-x-6">
          <!-- <a
            href="./index.html"
            class="text-sm font-semibold primary-text hover:text-gray-600 transition duration-300"
          >
            Home
          </a>
          <a
            href="./add-to-cart.html"
            class="text-sm font-semibold primary-text hover:text-gray-600 transition duration-300"
          >
            Cart
          </a>
          <a
            href="./my-profile.html"
            class="text-sm font-semibold primary-text hover:text-gray-600 transition duration-300"
          >
            My Profile
          </a> -->
        </div>
      </div>
    </nav>

    <!-- Payment Section -->
    <section
      class="container mx-auto mt-16 px-4 py-8 bg-white rounded-lg shadow-2xl"
    >
      <h1 class="text-3xl font-bold primary-text text-center mb-8">Payment</h1>

      <!-- Total Price -->
      <div class="text-center mb-6">
        <h2 class="text-lg font-semibold primary-text">
          Total Price: ₹<span id="total-price">0</span>
        </h2>
      </div>

      <!-- Payment Methods -->
      <div class="max-w-md mx-auto">
        <h3 class="text-lg font-semibold primary-text mb-4">
          Select Payment Method
        </h3>
        <div class="space-y-4">
          <label class="flex items-center space-x-3">
            <input
              type="radio"
              name="payment-method"
              value="UPI"
              class="form-radio text-blue-500"
            />
            <span class="text-gray-700">UPI</span>
          </label>
          <label class="flex items-center space-x-3">
            <input
              type="radio"
              name="payment-method"
              value="Cash on Delivery"
              class="form-radio text-blue-500"
            />
            <span class="text-gray-700">Cash on Delivery</span>
          </label>
        </div>
      </div>

      <!-- Proceed Button -->
      <div class="text-center mt-6">
        <button
          onclick="proceedToPayment()"
          class="button-primary px-6 py-3 rounded-lg font-semibold transition duration-300"
        >
          Proceed to Pay
        </button>
      </div>
    </section>

    <!-- Footer Section -->
    <footer class="header-bg py-6 mt-16">
      <div class="container mx-auto text-center">
        <p class="text-sm primary-text">
          © 2025 Kanha Fashion Hub. All rights reserved.
        </p>
      </div>
    </footer>

    <script>
      // Retrieve total price from localStorage
      const cartTotalPrice = localStorage.getItem("cartTotalPrice");
      const totalPriceElement = document.getElementById("total-price");

      // Display the total price
      if (cartTotalPrice) {
        totalPriceElement.textContent = cartTotalPrice;
      } else {
        totalPriceElement.textContent = "0"; // Default to 0 if no total price is found
      }

      // Function to proceed to payment
      function proceedToPayment() {
        const selectedMethod = document.querySelector(
          'input[name="payment-method"]:checked'
        );

        if (!selectedMethod) {
          alert("Please select a payment method before proceeding.");
          return;
        }

        // Save the selected payment method to localStorage
        const paymentMethod = selectedMethod.value;
        localStorage.setItem("selectedPaymentMethod", paymentMethod);

        if (paymentMethod === "UPI") {
          // Save total price for UPI payment
          localStorage.setItem("proceedToPayTotalPrice", cartTotalPrice);
          alert(
            `You have selected ${paymentMethod}. Redirecting to payment...`
          );
          window.location.href = "proceed-to-pay.html"; // Redirect to UPI payment page
        } else if (paymentMethod === "Cash on Delivery") {
          alert(
            `You have selected ${paymentMethod}. Redirecting to confirmation...`
          );
          window.location.href = "order-confirmation.html"; // Redirect to COD confirmation page
        }
      }
    </script>
  </body>
</html>
